name: "Setup WASM Build Environment"
description: "Install host capnp, pyodide-build and a pinned Emscripten SDK"

# These versions must stay in lockstep with the Pyodide kernel that ships in
# jupyterlite-pyodide-kernel (see docs/requirements_docs.txt):
#   pyodide-build 0.34.3 -> Pyodide 0.29.3 -> Emscripten 4.0.9 -> CPython 3.13
# See https://pyodide.org/en/stable/development/building-and-testing-packages.html
inputs:
  emsdk-version:
    description: "Emscripten SDK version (must match the Pyodide xbuildenv)"
    required: false
    default: "4.0.9"
  pyodide-build-version:
    description: "pyodide-build version"
    required: false
    default: "0.34.3"
  pyodide-xbuildenv-version:
    description: "Pyodide xbuildenv version (matches the JupyterLite kernel)"
    required: false
    default: "0.29.3"
  python-version:
    description: "Host Python used to run pyodide-build"
    required: false
    default: "3.13"

runs:
  using: "composite"
  steps:
    - name: Set up host Python
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
      with:
        python-version: "${{ inputs.python-version }}"

    - name: Build and install host capnp tools
      shell: bash
      run: |
        # The Ubuntu runner's `capnproto` package lags upstream and produces
        # generated C++ that is incompatible with libcapnp >=1.1.0 (the
        # version we cross-compile for wasm). Build from source so the host
        # capnp tool matches the wasm libcapnp ABI.
        ./scripts/library_tool.sh capnp download
        ./scripts/library_tool.sh capnp compile --target=native
        sudo ./scripts/library_tool.sh capnp install --target=native
        capnp --version

    - name: Install pyodide-build
      shell: bash
      run: |
        python3 -m venv "${RUNNER_TEMP}/pyodide-venv"
        # shellcheck disable=SC1091
        source "${RUNNER_TEMP}/pyodide-venv/bin/activate"
        python3 -m pip install --upgrade pip
        python3 -m pip install "pyodide-build==${{ inputs.pyodide-build-version }}"
        # Install the cross-build environment that matches the JupyterLite
        # kernel's bundled Pyodide (Python + Emscripten + lockfile).
        pyodide xbuildenv install "${{ inputs.pyodide-xbuildenv-version }}"
        echo "${RUNNER_TEMP}/pyodide-venv/bin" >> "${GITHUB_PATH}"

    - name: Cache Emscripten SDK
      id: cache-emsdk
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: thirdparties/emsdk
        key: emsdk-${{ runner.os }}-${{ inputs.emsdk-version }}

    - name: Install Emscripten SDK
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p thirdparties
        # Pinning by tag is sufficient: the emsdk repo's tags match emscripten
        # versions (e.g. tag 3.1.58 == Emscripten 3.1.58 release).
        git clone --branch "${{ inputs.emsdk-version }}" --depth 1 \
          https://github.com/emscripten-core/emsdk.git thirdparties/emsdk
        thirdparties/emsdk/emsdk install "${{ inputs.emsdk-version }}"
        thirdparties/emsdk/emsdk activate "${{ inputs.emsdk-version }}"
